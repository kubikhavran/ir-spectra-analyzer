name: Build Windows Installer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    name: Build & publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Generate icon
        shell: pwsh
        run: python scripts/build_icon.py

      - name: Patch installer script with tag version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $path = "packaging/installer.iss"
          (Get-Content $path) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`"" | Set-Content $path

      - name: Build with PyInstaller
        shell: pwsh
        run: pyinstaller packaging/ir-spectra-analyzer.spec --clean --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc packaging/installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ir-spectra-analyzer-windows-installer
          path: dist/installer/*.exe
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
