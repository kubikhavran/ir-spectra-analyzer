name: Build release installers

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# Shared version-extraction step (referenced via needs: extract-version)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  extract-version:
    name: Extract version from tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

  # ───────────────────────────────────────────────────────────────────────────
  # Windows — Inno Setup installer (.exe)
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows installer
    needs: extract-version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate icon
        shell: pwsh
        run: python scripts/build_icon.py

      - name: Patch installer version
        shell: pwsh
        run: |
          $v = "${{ needs.extract-version.outputs.version }}"
          $p = "packaging/installer.iss"
          (Get-Content $p) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$v`"" | Set-Content $p

      - name: PyInstaller
        shell: pwsh
        run: pyinstaller packaging/ir-spectra-analyzer.spec --clean --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc packaging/installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/*.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
          generate_release_notes: true

  # ───────────────────────────────────────────────────────────────────────────
  # macOS Apple Silicon (arm64) — .dmg
  # ───────────────────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: macOS DMG (Apple Silicon)
    needs: extract-version
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" dmgbuild

      - name: Generate icon + .icns
        run: python scripts/build_icon.py

      - name: PyInstaller
        run: pyinstaller packaging/ir-spectra-analyzer-mac.spec --clean --noconfirm

      - name: Build DMG
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          mkdir -p dist
          dmgbuild \
            -s packaging/dmg_settings.py \
            -D version="${VERSION}" \
            -D arch="arm64" \
            "IR Spectra Analyzer" \
            "dist/IR-Spectra-Analyzer-${VERSION}-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  # ───────────────────────────────────────────────────────────────────────────
  # macOS Intel (x86_64) — .dmg
  # ───────────────────────────────────────────────────────────────────────────
  build-macos-intel:
    name: macOS DMG (Intel)
    needs: extract-version
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" dmgbuild

      - name: Generate icon + .icns
        run: python scripts/build_icon.py

      - name: PyInstaller
        run: pyinstaller packaging/ir-spectra-analyzer-mac.spec --clean --noconfirm

      - name: Build DMG
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          mkdir -p dist
          dmgbuild \
            -s packaging/dmg_settings.py \
            -D version="${VERSION}" \
            -D arch="x86_64" \
            "IR Spectra Analyzer" \
            "dist/IR-Spectra-Analyzer-${VERSION}-x86_64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
